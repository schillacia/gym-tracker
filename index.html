<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Gym Tracker">
<title>Gym Tracker</title>
<style>
:root {
  --bg: #0a0a0c;
  --surface: #111114;
  --surface2: #18181c;
  --surface3: #1e1e24;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --text: #f0f0ee;
  --text2: #b8b8b6;
  --text3: #888886;
  --accent: #d4f53c;
  --red: #ff4c3b;
  --red-dim: rgba(255,76,59,0.15);
  --radius: 10px;
  --radius-lg: 14px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}
.app-shell {
  max-width: 440px;
  margin: 0 auto;
  min-height: 100vh;
  background: var(--bg);
}
.app-header {
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  padding: 16px 16px 0;
  position: sticky;
  top: 0;
  z-index: 20;
}
.app-title {
  font-size: 20px;
  font-weight: 800;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 12px;
}
.tab-bar { display: flex; }
.tab {
  flex: 1;
  padding: 10px 4px;
  border: none;
  background: transparent;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  color: var(--text3);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: color 0.15s, border-color 0.15s;
}
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.page { display: none; padding: 16px 16px 80px; }
.page.active { display: block; }
.section-title {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--text3);
  margin: 20px 0 8px;
}
.section-title:first-child { margin-top: 0; }
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 14px;
  margin-bottom: 10px;
}
label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text2);
  display: block;
  margin-bottom: 5px;
}
input[type="text"],
input[type="number"],
input[type="date"],
select {
  width: 100%;
  padding: 9px 11px;
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  font-size: 14px;
  background: var(--surface2);
  color: var(--text);
  margin-bottom: 10px;
  appearance: none;
  -webkit-appearance: none;
  outline: none;
  color-scheme: dark;
}
input:focus, select:focus {
  border-color: var(--accent);
  outline: none;
}
select option { background: #1e1e24; }
.btn-primary {
  width: 100%;
  padding: 12px;
  background: var(--accent);
  color: #0a0a0c;
  border: none;
  border-radius: var(--radius);
  font-size: 13px;
  font-weight: 800;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  cursor: pointer;
  margin-top: 4px;
  display: block;
}
.btn-danger {
  padding: 5px 10px;
  background: transparent;
  border: 1px solid rgba(255,76,59,0.35);
  border-radius: var(--radius);
  font-size: 11px;
  font-weight: 700;
  color: var(--red);
  cursor: pointer;
}
.btn-add-set {
  width: 100%;
  padding: 9px;
  background: transparent;
  border: 1px dashed var(--border2);
  border-radius: var(--radius);
  font-size: 12px;
  font-weight: 600;
  color: var(--text2);
  cursor: pointer;
  margin: 8px 0 4px;
  display: block;
}
.row { display: flex; gap: 8px; }
.row > * { flex: 1; }
.sets-header {
  display: grid;
  grid-template-columns: 24px 1fr 1fr 36px;
  gap: 6px;
  padding: 0 0 6px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 4px;
}
.sets-header span {
  font-size: 10px;
  font-weight: 700;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.set-row {
  display: grid;
  grid-template-columns: 24px 1fr 1fr 36px;
  gap: 6px;
  align-items: center;
  padding: 3px 0;
}
.set-num { font-size: 11px; color: var(--text3); text-align: center; }
.set-row input { margin-bottom: 0; padding: 7px 8px; font-size: 13px; }
.set-row .btn-danger { padding: 5px 7px; }
.badge {
  display: inline-block;
  padding: 2px 7px;
  border-radius: 4px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.05em;
  text-transform: uppercase;
}
.badge-blue   { background: rgba(55,138,221,0.2);  color: #6ab0f5; }
.badge-green  { background: rgba(100,180,80,0.2);   color: #82d460; }
.badge-amber  { background: rgba(212,245,60,0.15);  color: #bcd820; }
.badge-coral  { background: rgba(255,100,60,0.2);   color: #ff7a5a; }
.badge-purple { background: rgba(160,100,240,0.2);  color: #c090f8; }
.badge-teal   { background: rgba(30,200,160,0.2);   color: #40d4b0; }
.exercise-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
}
.exercise-item:last-child { border-bottom: none; }
.exercise-name { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
.entry-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  margin-bottom: 8px;
  overflow: hidden;
}
.entry-header {
  display: flex;
  justify-content: space-between;
  padding: 10px 12px;
  background: var(--surface2);
  border-bottom: 1px solid var(--border);
}
.entry-exname {
  font-size: 15px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  margin-bottom: 4px;
}
.entry-date { font-size: 11px; color: var(--text3); }
.entry-sets { padding: 8px 12px 10px; }
.entry-set-row {
  display: grid;
  grid-template-columns: 1.2rem 1fr 1fr;
  gap: 4px;
  padding: 2px 0;
  font-size: 13px;
  color: var(--text2);
}
.entry-set-row .sn { font-size: 10px; color: var(--text3); }
.entry-vol { font-size: 11px; color: var(--text3); margin-top: 5px; }
.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px; }
.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-top: 2px solid var(--accent);
  border-radius: var(--radius);
  padding: 12px 14px;
}
.stat-label { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text3); margin-bottom: 5px; }
.stat-value { font-size: 28px; font-weight: 800; color: var(--text); line-height: 1; }
.stat-unit { font-size: 13px; color: var(--text3); font-weight: 600; }
.chart-container {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 14px;
  margin-bottom: 10px;
}
.chart-toggle {
  display: flex;
  background: var(--surface2);
  border-radius: var(--radius);
  padding: 3px;
  margin-bottom: 14px;
  gap: 3px;
}
.chart-toggle button {
  flex: 1;
  padding: 7px;
  border: none;
  border-radius: 8px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  cursor: pointer;
  background: transparent;
  color: var(--text3);
  transition: background 0.15s, color 0.15s;
}
.chart-toggle button.active { background: var(--accent); color: #0a0a0c; }
.chart-wrap { position: relative; width: 100%; height: 200px; }
.pb-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
}
.pb-item:last-child { border-bottom: none; }
.pb-exname { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
.pb-val { font-size: 22px; font-weight: 800; color: var(--accent); text-align: right; }
.pb-date { font-size: 10px; color: var(--text3); text-align: right; }
.filter-row { display: flex; gap: 8px; margin-bottom: 4px; }
.filter-row select { margin-bottom: 0; flex: 1; }
.muscle-chart-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 14px;
  margin-bottom: 12px;
}
.muscle-chart-title { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.muscle-chart-sub { font-size: 10px; color: var(--text3); }
.muscle-chart-wrap { position: relative; width: 100%; height: 180px; }
.chart-legend { display: flex; flex-wrap: wrap; gap: 8px 14px; margin-top: 10px; }
.legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text2); }
.legend-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.empty { text-align: center; color: var(--text3); font-size: 12px; padding: 24px 0; }
#toast {
  position: fixed;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--accent);
  color: #0a0a0c;
  padding: 8px 20px;
  border-radius: 4px;
  font-size: 12px;
  font-weight: 800;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  opacity: 0;
  transition: opacity 0.2s;
  pointer-events: none;
  z-index: 100;
  white-space: nowrap;
}
@media (min-width: 500px) {
  body { background: #050507; }
  .app-shell {
    margin-top: 20px;
    border-radius: 20px 20px 0 0;
    overflow: hidden;
    border: 1px solid var(--border2);
    border-bottom: none;
  }
}
</style>
</head>
<body>
<div class="app-shell">
  <div class="app-header">
    <div class="app-title">Gym Tracker</div>
    <div class="tab-bar">
      <button class="tab active" id="tab-log" onclick="switchTab('log')">Log</button>
      <button class="tab" id="tab-admin" onclick="switchTab('admin')">Exercises</button>
      <button class="tab" id="tab-summary" onclick="switchTab('summary')">Progress</button>
    </div>
  </div>

  <!-- LOG -->
  <div class="page active" id="page-log">
    <div class="section-title">New entry</div>
    <div class="card">
      <div class="row">
        <div><label>Date</label><input type="date" id="log-date"></div>
        <div><label>Exercise</label><select id="log-exercise"><option value="">Select...</option></select></div>
      </div>
      <div class="sets-header">
        <span>#</span><span>Weight (lbs)</span><span>Reps</span><span></span>
      </div>
      <div id="sets-container"></div>
      <button class="btn-add-set" onclick="addSetRow()">+ Add set</button>
      <button class="btn-primary" onclick="saveEntry()">Save workout</button>
    </div>
    <div class="section-title">History</div>
    <div id="log-history"></div>
  </div>

  <!-- EXERCISES -->
  <div class="page" id="page-admin">
    <div class="section-title">Add exercise</div>
    <div class="card">
      <label>Exercise name</label>
      <input type="text" id="admin-name" placeholder="e.g. Romanian Deadlift">
      <label>Muscle group</label>
      <select id="admin-muscle">
        <option value="Chest">Chest</option>
        <option value="Back">Back</option>
        <option value="Shoulders">Shoulders</option>
        <option value="Biceps">Biceps</option>
        <option value="Triceps">Triceps</option>
        <option value="Legs">Legs</option>
        <option value="Glutes">Glutes</option>
        <option value="Core">Core</option>
        <option value="Cardio">Cardio</option>
        <option value="Full Body">Full Body</option>
      </select>
      <button class="btn-primary" onclick="addExercise()">Add exercise</button>
    </div>
    <div class="section-title">Library</div>
    <div class="card" id="exercise-list"><div class="empty">No exercises yet</div></div>
  </div>

  <!-- PROGRESS -->
  <div class="page" id="page-summary">
    <div class="section-title">Filters</div>
    <div class="filter-row">
      <select id="sum-muscle" onchange="filterByMuscle()"><option value="">All muscles</option></select>
      <select id="sum-exercise" onchange="renderSummary()"><option value="">All exercises</option></select>
    </div>
    <div class="section-title">Overview</div>
    <div class="stat-grid" id="stat-grid"></div>
    <div class="section-title">Chart</div>
    <div class="chart-container">
      <div class="chart-toggle">
        <button class="active" id="toggle-maxw" onclick="setChartMode('maxw')">Max weight</button>
        <button id="toggle-vol" onclick="setChartMode('vol')">Volume</button>
      </div>
      <div class="chart-wrap">
        <canvas id="progressChart" role="img" aria-label="Workout progress chart">No data yet.</canvas>
      </div>
    </div>
    <div class="section-title">Personal bests</div>
    <div class="card" id="pb-list"><div class="empty">Log workouts to see records</div></div>
    <div class="section-title">Volume by muscle group</div>
    <div id="muscle-charts"></div>
    <div class="section-title">Export data</div>
    <div class="card">
      <div style="font-size:13px;color:var(--text2);margin-bottom:10px;line-height:1.6">Download all your workout data as a CSV you can open in Excel or Google Sheets.</div>
      <div id="export-info" style="font-size:11px;color:var(--text3);margin-bottom:10px;"></div>
      <button class="btn-primary" onclick="exportCSV()">Download CSV</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>

var MUSCLE_COLORS = {
  Chest:'badge-coral', Back:'badge-blue', Shoulders:'badge-amber',
  Biceps:'badge-purple', Triceps:'badge-teal', Legs:'badge-green',
  Glutes:'badge-coral', Core:'badge-blue', Cardio:'badge-amber', 'Full Body':'badge-purple'
};

var PALETTE = ['#d4f53c','#40d4b0','#ff7a5a','#c090f8','#6ab0f5','#82d460','#ffb840','#ff6090','#50e8d0','#a0c8ff'];

function load(k, def) {
  try { var v = localStorage.getItem(k); return v !== null ? JSON.parse(v) : def; } catch(e) { return def; }
}
function save(k, v) {
  try { localStorage.setItem(k, JSON.stringify(v)); } catch(e) {}
}

var exercises = load('gym_exercises', [
  {name:'Bench Press', muscle:'Chest'},
  {name:'Squat', muscle:'Legs'},
  {name:'Deadlift', muscle:'Back'},
  {name:'Overhead Press', muscle:'Shoulders'},
  {name:'Pull-up', muscle:'Back'},
  {name:'Bicep Curl', muscle:'Biceps'},
  {name:'Tricep Pushdown', muscle:'Triceps'},
  {name:'Lat Pulldown', muscle:'Back'}
]);
var entries = load('gym_entries', []);
var setRows = [];
var chartInst = null;
var chartMode = 'maxw';
var muscleCharts = {};

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.style.opacity = 1;
  setTimeout(function() { t.style.opacity = 0; }, 2000);
}

function switchTab(name) {
  var tabs = document.querySelectorAll('.tab');
  var pages = document.querySelectorAll('.page');
  for (var i = 0; i < tabs.length; i++) tabs[i].classList.remove('active');
  for (var i = 0; i < pages.length; i++) pages[i].classList.remove('active');
  document.getElementById('tab-' + name).classList.add('active');
  document.getElementById('page-' + name).classList.add('active');
  if (name === 'summary') renderSummary();
}

function populateSelects() {
  var logSel = document.getElementById('log-exercise');
  var logCur = logSel.value;
  logSel.innerHTML = '<option value="">Select exercise...</option>';
  for (var i = 0; i < exercises.length; i++) {
    var o = document.createElement('option');
    o.value = exercises[i].name;
    o.textContent = exercises[i].name;
    logSel.appendChild(o);
  }
  logSel.value = logCur;

  var exSel = document.getElementById('sum-exercise');
  var exCur = exSel.value;
  exSel.innerHTML = '<option value="">All exercises</option>';
  for (var i = 0; i < exercises.length; i++) {
    var o = document.createElement('option');
    o.value = exercises[i].name;
    o.textContent = exercises[i].name;
    exSel.appendChild(o);
  }
  exSel.value = exCur;

  var mSel = document.getElementById('sum-muscle');
  var mCur = mSel.value;
  var muscles = [];
  for (var i = 0; i < exercises.length; i++) {
    if (muscles.indexOf(exercises[i].muscle) === -1) muscles.push(exercises[i].muscle);
  }
  muscles.sort();
  mSel.innerHTML = '<option value="">All muscles</option>';
  for (var i = 0; i < muscles.length; i++) {
    var o = document.createElement('option');
    o.value = muscles[i];
    o.textContent = muscles[i];
    mSel.appendChild(o);
  }
  mSel.value = mCur;
}

function renderExerciseList() {
  var el = document.getElementById('exercise-list');
  if (!exercises.length) { el.innerHTML = '<div class="empty">No exercises yet</div>'; return; }
  var html = '';
  for (var i = 0; i < exercises.length; i++) {
    var e = exercises[i];
    var bc = MUSCLE_COLORS[e.muscle] || 'badge-blue';
    html += '<div class="exercise-item"><div><div class="exercise-name">' + e.name + '</div><span class="badge ' + bc + '">' + e.muscle + '</span></div><button class="btn-danger" onclick="removeExercise(' + i + ')">Remove</button></div>';
  }
  el.innerHTML = html;
}

function addExercise() {
  var n = document.getElementById('admin-name').value.trim();
  var m = document.getElementById('admin-muscle').value;
  if (!n) { showToast('Enter a name'); return; }
  for (var i = 0; i < exercises.length; i++) {
    if (exercises[i].name.toLowerCase() === n.toLowerCase()) { showToast('Already exists'); return; }
  }
  exercises.push({name: n, muscle: m});
  save('gym_exercises', exercises);
  document.getElementById('admin-name').value = '';
  renderExerciseList();
  populateSelects();
  showToast('Exercise added');
}

function removeExercise(i) {
  exercises.splice(i, 1);
  save('gym_exercises', exercises);
  renderExerciseList();
  populateSelects();
  showToast('Removed');
}

function addSetRow(w, r) {
  w = w || '';
  r = r || '';
  var idx = setRows.length;
  setRows.push({weight: w, reps: r});
  var c = document.getElementById('sets-container');
  var row = document.createElement('div');
  row.className = 'set-row';
  row.id = 'setrow-' + idx;
  row.innerHTML =
    '<div class="set-num">' + (idx + 1) + '</div>' +
    '<input type="number" min="0" step="2.5" placeholder="0" value="' + w + '" onchange="setRows[' + idx + '].weight=this.value">' +
    '<input type="number" min="1" step="1" placeholder="0" value="' + r + '" onchange="setRows[' + idx + '].reps=this.value">' +
    '<button class="btn-danger" onclick="removeSetRow(' + idx + ')">✕</button>';
  c.appendChild(row);
}

function removeSetRow(i) {
  var el = document.getElementById('setrow-' + i);
  if (el) el.remove();
  setRows[i] = null;
}

function saveEntry() {
  var date = document.getElementById('log-date').value;
  var ex = document.getElementById('log-exercise').value;
  if (!date) { showToast('Pick a date'); return; }
  if (!ex) { showToast('Select an exercise'); return; }
  var sets = [];
  for (var i = 0; i < setRows.length; i++) {
    var s = setRows[i];
    if (s && s.weight !== '' && s.reps !== '') {
      var w = parseFloat(s.weight) || 0;
      var r = parseInt(s.reps) || 0;
      if (r > 0) sets.push({weight: w, reps: r});
    }
  }
  if (!sets.length) { showToast('Add at least one set'); return; }
  entries.push({date: date, exercise: ex, sets: sets, id: Date.now()});
  entries.sort(function(a, b) { return b.date.localeCompare(a.date); });
  save('gym_entries', entries);
  setRows = [];
  document.getElementById('sets-container').innerHTML = '';
  addSetRow();
  renderHistory();
  showToast('Workout saved');
}

function removeEntry(id) {
  var newEntries = [];
  for (var i = 0; i < entries.length; i++) {
    if (entries[i].id !== id) newEntries.push(entries[i]);
  }
  entries = newEntries;
  save('gym_entries', entries);
  renderHistory();
  showToast('Deleted');
}

function getExerciseMuscle(name) {
  for (var i = 0; i < exercises.length; i++) {
    if (exercises[i].name === name) return exercises[i].muscle;
  }
  return '';
}

function renderHistory() {
  var el = document.getElementById('log-history');
  if (!entries.length) { el.innerHTML = '<div class="empty">No entries logged yet</div>'; return; }
  var html = '';
  var count = Math.min(entries.length, 30);
  for (var i = 0; i < count; i++) {
    var e = entries[i];
    var muscle = getExerciseMuscle(e.exercise);
    var bc = MUSCLE_COLORS[muscle] || 'badge-blue';
    var maxW = 0;
    var vol = 0;
    for (var j = 0; j < e.sets.length; j++) {
      if (e.sets[j].weight > maxW) maxW = e.sets[j].weight;
      vol += e.sets[j].weight * e.sets[j].reps;
    }
    var setsHtml = '';
    for (var j = 0; j < e.sets.length; j++) {
      setsHtml += '<div class="entry-set-row"><span class="sn">' + (j+1) + '</span><span>' + e.sets[j].weight + ' lbs</span><span>' + e.sets[j].reps + ' reps</span></div>';
    }
    html += '<div class="entry-card">' +
      '<div class="entry-header">' +
        '<div><div class="entry-exname">' + e.exercise + '</div><span class="badge ' + bc + '">' + muscle + '</span></div>' +
        '<div style="text-align:right"><div class="entry-date">' + e.date + '</div>' +
        '<div style="font-size:12px;color:var(--text2);margin:3px 0">' + e.sets.length + ' sets · ' + maxW + ' lbs max</div>' +
        '<button class="btn-danger" onclick="removeEntry(' + e.id + ')">Delete</button></div>' +
      '</div>' +
      '<div class="entry-sets">' + setsHtml + '<div class="entry-vol">vol: ' + vol.toLocaleString() + ' lbs</div></div>' +
    '</div>';
  }
  el.innerHTML = html;
}

function filterByMuscle() {
  var muscle = document.getElementById('sum-muscle').value;
  var exSel = document.getElementById('sum-exercise');
  exSel.innerHTML = '<option value="">All exercises</option>';
  for (var i = 0; i < exercises.length; i++) {
    if (!muscle || exercises[i].muscle === muscle) {
      var o = document.createElement('option');
      o.value = exercises[i].name;
      o.textContent = exercises[i].name;
      exSel.appendChild(o);
    }
  }
  renderSummary();
}

function setChartMode(mode) {
  chartMode = mode;
  document.getElementById('toggle-maxw').classList.toggle('active', mode === 'maxw');
  document.getElementById('toggle-vol').classList.toggle('active', mode === 'vol');
  renderMainChart(getFilteredEntries());
}

function getFilteredEntries() {
  var exF = document.getElementById('sum-exercise').value;
  var mF = document.getElementById('sum-muscle').value;
  var result = [];
  for (var i = 0; i < entries.length; i++) {
    var e = entries[i];
    if (exF && e.exercise !== exF) continue;
    if (mF && getExerciseMuscle(e.exercise) !== mF) continue;
    result.push(e);
  }
  return result;
}

function renderMainChart(filtered) {
  if (chartInst) { chartInst.destroy(); chartInst = null; }
  var byDate = {};
  for (var i = 0; i < filtered.length; i++) {
    var e = filtered[i];
    var val = 0;
    if (chartMode === 'maxw') {
      for (var j = 0; j < e.sets.length; j++) if (e.sets[j].weight > val) val = e.sets[j].weight;
    } else {
      for (var j = 0; j < e.sets.length; j++) val += e.sets[j].weight * e.sets[j].reps;
    }
    if (!byDate[e.date] || byDate[e.date] < val) byDate[e.date] = val;
  }
  var dates = Object.keys(byDate).sort();
  if (!dates.length) return;
  var vals = [];
  for (var i = 0; i < dates.length; i++) vals.push(byDate[dates[i]]);
  var labels = [];
  for (var i = 0; i < dates.length; i++) { var p = dates[i].split('-'); labels.push(p[1] + '/' + p[2]); }
  var isVol = chartMode === 'vol';
  var canvas = document.getElementById('progressChart');
  if (!canvas) return;
  chartInst = new Chart(canvas, {
    type: 'line',
    data: {
      labels: labels,
      datasets: [{
        label: isVol ? 'Volume' : 'Max weight',
        data: vals,
        borderColor: '#d4f53c',
        backgroundColor: 'rgba(212,245,60,0.06)',
        borderWidth: 2,
        pointBackgroundColor: '#d4f53c',
        pointBorderColor: '#0a0a0c',
        pointBorderWidth: 2,
        pointRadius: 4,
        fill: true,
        tension: 0.35
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: {display: false},
        tooltip: {
          backgroundColor: '#1e1e24', titleColor: '#d4f53c',
          bodyColor: 'rgba(240,240,238,0.8)', borderColor: 'rgba(255,255,255,0.08)',
          borderWidth: 1, padding: 10, cornerRadius: 8
        }
      },
      scales: {
        x: { grid: {color: 'rgba(255,255,255,0.04)'}, ticks: {color: '#888886', font: {size: 10}, maxRotation: 45, autoSkip: true} },
        y: { grid: {color: 'rgba(255,255,255,0.04)'}, ticks: {color: '#888886', font: {size: 10}, callback: function(v) { return isVol ? (v >= 1000 ? Math.round(v/1000) + 'k' : v) : v + 'lb'; }},
          title: {display: true, text: isVol ? 'Volume (lbs)' : 'Max weight (lbs)', color: '#888886', font: {size: 10}} }
      }
    }
  });
}

function renderMuscleCharts() {
  var container = document.getElementById('muscle-charts');
  var muscles = [];
  for (var i = 0; i < exercises.length; i++) {
    if (muscles.indexOf(exercises[i].muscle) === -1) muscles.push(exercises[i].muscle);
  }
  muscles.sort();

  var hasData = false;
  for (var i = 0; i < muscles.length; i++) {
    for (var j = 0; j < entries.length; j++) {
      if (getExerciseMuscle(entries[j].exercise) === muscles[i]) { hasData = true; break; }
    }
    if (hasData) break;
  }
  if (!hasData) {
    container.innerHTML = '<div class="empty" style="margin-bottom:16px">Log workouts to see muscle group charts</div>';
    return;
  }

  var keys = Object.keys(muscleCharts);
  for (var i = 0; i < keys.length; i++) { try { muscleCharts[keys[i]].destroy(); } catch(e) {} }
  muscleCharts = {};

  var cards = [];
  for (var mi = 0; mi < muscles.length; mi++) {
    var muscle = muscles[mi];
    var exInMuscle = [];
    for (var i = 0; i < exercises.length; i++) {
      if (exercises[i].muscle === muscle) exInMuscle.push(exercises[i].name);
    }
    var relEntries = [];
    for (var i = 0; i < entries.length; i++) {
      if (exInMuscle.indexOf(entries[i].exercise) !== -1) relEntries.push(entries[i]);
    }
    if (!relEntries.length) continue;

    var allDates = [];
    for (var i = 0; i < relEntries.length; i++) {
      if (allDates.indexOf(relEntries[i].date) === -1) allDates.push(relEntries[i].date);
    }
    allDates.sort();

    var datasets = [];
    for (var ei = 0; ei < exInMuscle.length; ei++) {
      var exName = exInMuscle[ei];
      var exEntries = [];
      for (var i = 0; i < relEntries.length; i++) {
        if (relEntries[i].exercise === exName) exEntries.push(relEntries[i]);
      }
      if (!exEntries.length) continue;
      var volByDate = {};
      for (var i = 0; i < exEntries.length; i++) {
        var v = 0;
        for (var j = 0; j < exEntries[i].sets.length; j++) v += exEntries[i].sets[j].weight * exEntries[i].sets[j].reps;
        volByDate[exEntries[i].date] = (volByDate[exEntries[i].date] || 0) + v;
      }
      var color = PALETTE[ei % PALETTE.length];
      var data = [];
      for (var i = 0; i < allDates.length; i++) data.push(volByDate[allDates[i]] || null);
      datasets.push({label: exName, data: data, borderColor: color, backgroundColor: color + '18',
        borderWidth: 2, pointBackgroundColor: color, pointBorderColor: '#0a0a0c',
        pointBorderWidth: 1.5, pointRadius: 3.5, spanGaps: false, fill: false, tension: 0.3, _color: color});
    }
    if (!datasets.length) continue;

    var cid = 'mc_' + muscle.replace(/\s+/g, '_').toLowerCase();
    var bc = MUSCLE_COLORS[muscle] || 'badge-blue';
    var labels = [];
    for (var i = 0; i < allDates.length; i++) { var p = allDates[i].split('-'); labels.push(p[1] + '/' + p[2]); }
    cards.push({muscle: muscle, cid: cid, bc: bc, labels: labels, datasets: datasets});
  }

  var html = '';
  for (var i = 0; i < cards.length; i++) {
    var c = cards[i];
    var leg = '';
    for (var j = 0; j < c.datasets.length; j++) {
      leg += '<div class="legend-item"><div class="legend-dot" style="background:' + c.datasets[j]._color + '"></div>' + c.datasets[j].label + '</div>';
    }
    html += '<div class="muscle-chart-card"><div class="muscle-chart-title"><span class="badge ' + c.bc + '">' + c.muscle + '</span><span class="muscle-chart-sub">volume over time</span></div>' +
      '<div class="muscle-chart-wrap"><canvas id="' + c.cid + '" role="img" aria-label="Volume chart for ' + c.muscle + '">No data.</canvas></div>' +
      '<div class="chart-legend">' + leg + '</div></div>';
  }
  container.innerHTML = html;

  for (var ci = 0; ci < cards.length; ci++) {
    (function(c) {
      var canvas = document.getElementById(c.cid);
      if (!canvas) return;
      muscleCharts[c.cid] = new Chart(canvas, {
        type: 'line',
        data: {labels: c.labels, datasets: c.datasets},
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: {
            legend: {display: false},
            tooltip: {backgroundColor: '#1e1e24', titleColor: '#d4f53c', bodyColor: 'rgba(240,240,238,0.8)', borderColor: 'rgba(255,255,255,0.08)', borderWidth: 1, padding: 10, cornerRadius: 8}
          },
          scales: {
            x: {grid: {color: 'rgba(255,255,255,0.04)'}, ticks: {color: '#888886', font: {size: 10}, maxRotation: 45, autoSkip: true, maxTicksLimit: 8}},
            y: {grid: {color: 'rgba(255,255,255,0.04)'}, ticks: {color: '#888886', font: {size: 10}, callback: function(v) { return v >= 1000 ? Math.round(v/1000) + 'k' : v; }},
              title: {display: true, text: 'Volume (lbs)', color: '#888886', font: {size: 10}}}
          }
        }
      });
    })(cards[ci]);
  }
}

function renderSummary() {
  var filtered = getFilteredEntries();
  var sessions = {};
  var totalSets = 0;
  var totalVol = 0;
  var maxW = 0;
  for (var i = 0; i < filtered.length; i++) {
    var e = filtered[i];
    sessions[e.date] = true;
    totalSets += e.sets.length;
    for (var j = 0; j < e.sets.length; j++) {
      totalVol += e.sets[j].weight * e.sets[j].reps;
      if (e.sets[j].weight > maxW) maxW = e.sets[j].weight;
    }
  }
  var totalSessions = Object.keys(sessions).length;

  document.getElementById('stat-grid').innerHTML =
    '<div class="stat-card"><div class="stat-label">Sessions</div><div class="stat-value">' + totalSessions + '</div></div>' +
    '<div class="stat-card"><div class="stat-label">Sets logged</div><div class="stat-value">' + totalSets + '</div></div>' +
    '<div class="stat-card"><div class="stat-label">Total volume</div><div class="stat-value">' + (totalVol/1000).toFixed(1) + '<span class="stat-unit">k</span></div></div>' +
    '<div class="stat-card"><div class="stat-label">Max weight</div><div class="stat-value">' + maxW + '<span class="stat-unit">lb</span></div></div>';

  renderMainChart(filtered);

  var pbData = {};
  var exF = document.getElementById('sum-exercise').value;
  var mF = document.getElementById('sum-muscle').value;
  for (var i = 0; i < entries.length; i++) {
    var e = entries[i];
    if (exF && e.exercise !== exF) continue;
    if (mF && getExerciseMuscle(e.exercise) !== mF) continue;
    var mw = 0;
    for (var j = 0; j < e.sets.length; j++) if (e.sets[j].weight > mw) mw = e.sets[j].weight;
    if (!pbData[e.exercise] || pbData[e.exercise].weight < mw) pbData[e.exercise] = {weight: mw, date: e.date};
  }
  var pbKeys = Object.keys(pbData);
  var pbEl = document.getElementById('pb-list');
  if (!pbKeys.length) {
    pbEl.innerHTML = '<div class="empty">Log workouts to see records</div>';
  } else {
    var html = '';
    for (var i = 0; i < pbKeys.length; i++) {
      var ex = pbKeys[i];
      var pb = pbData[ex];
      var muscle = getExerciseMuscle(ex);
      var bc = MUSCLE_COLORS[muscle] || 'badge-blue';
      html += '<div class="pb-item"><div><div class="pb-exname">' + ex + '</div><span class="badge ' + bc + '">' + muscle + '</span></div>' +
        '<div><div class="pb-val">' + pb.weight + ' lbs</div><div class="pb-date">' + pb.date + '</div></div></div>';
    }
    pbEl.innerHTML = html;
  }

  renderMuscleCharts();

  var totalRows = 0;
  for (var i = 0; i < entries.length; i++) totalRows += entries[i].sets.length;
  var expEl = document.getElementById('export-info');
  if (expEl) expEl.textContent = entries.length + ' sessions · ' + totalRows + ' sets ready to export';
}

function exportCSV() {
  if (!entries.length) { showToast('No data to export'); return; }
  var rows = [['Date','Exercise','Muscle Group','Set','Weight (lbs)','Reps','Set Volume (lbs)','Session Volume (lbs)']];
  for (var i = 0; i < entries.length; i++) {
    var e = entries[i];
    var muscle = getExerciseMuscle(e.exercise);
    var sessionVol = 0;
    for (var j = 0; j < e.sets.length; j++) sessionVol += e.sets[j].weight * e.sets[j].reps;
    for (var j = 0; j < e.sets.length; j++) {
      rows.push([e.date, e.exercise, muscle, j+1, e.sets[j].weight, e.sets[j].reps, e.sets[j].weight * e.sets[j].reps, j === 0 ? sessionVol : '']);
    }
  }
  var csv = '';
  for (var i = 0; i < rows.length; i++) {
    var row = [];
    for (var j = 0; j < rows[i].length; j++) {
      var str = String(rows[i][j]);
      if (str.indexOf(',') !== -1 || str.indexOf('"') !== -1) str = '"' + str.replace(/"/g, '""') + '"';
      row.push(str);
    }
    csv += row.join(',') + '\n';
  }
  var blob = new Blob([csv], {type: 'text/csv;charset=utf-8;'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  var now = new Date();
  a.download = 'gym-tracker-' + now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0') + '.csv';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('CSV downloaded!');
}

// Init
document.getElementById('log-date').value = new Date().toISOString().split('T')[0];
populateSelects();
addSetRow();
renderHistory();
renderExerciseList();

</script>
